<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>测一下你是鸿儒里的谁</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="noise"></div>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>

  <main class="container">
    <header class="hero">
      <p class="eyebrow">鸿儒人格测试 2.0</p>
      <h1>测一下你是鸿儒里的谁</h1>
      <p class="subtitle">升级了配色与交互，每题提供更多可选答案，测试体验更贴近真实状态。</p>
    </header>

    <section class="panel" id="introScreen">
      <h2>测试说明</h2>
      <p>题目参考 MBTI 的双分法思路，一共 16 题。</p>
      <p>每题至少 3 个选项，支持“中间态/看情况”回答。</p>
      <button class="btn btn-primary" id="startBtn">开始测试</button>
    </section>

    <section class="panel hidden" id="quizScreen">
      <div class="progress-wrap">
        <span id="progressText">第 1 / 16 题</span>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
      <h2 id="questionTitle"></h2>
      <p class="question-note" id="questionNote"></p>
      <div class="options" id="optionsWrap"></div>
    </section>

    <section class="panel hidden" id="resultScreen">
      <p class="eyebrow">测试结果</p>
      <h2 id="resultName"></h2>
      <p class="type-badge" id="resultType"></p>
      <p class="tagline" id="resultTagline"></p>
      <p class="bio" id="resultBio"></p>
      <p class="verdict" id="resultVerdict"></p>
      <div class="reason-box" id="reasonBox"></div>

      <div class="dimension-box" id="dimensionBox"></div>
      <p class="runner-up" id="runnerUp"></p>

      <div class="actions">
        <button class="btn btn-primary" id="retryBtn">再测一次</button>
        <button class="btn btn-ghost" id="copyBtn">复制结果</button>
      </div>
      <p class="hint">声明：仅供娱乐，不具备心理学诊断效力。</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
